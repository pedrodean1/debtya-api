<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
  />
  <title>DebtYa Login Test</title>
  <style>
    :root{
      --bg:#f6f9ff;
      --card:#ffffff;
      --border:#d8e3f2;
      --text:#16304f;
      --muted:#6e84a3;
      --primary:#4f8df7;
      --primary2:#3c7ae6;
      --ok:#22a06b;
      --danger:#e25b5b;
      --shadow:0 10px 30px rgba(63,105,163,.10);
      --radius:20px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      font-family:Inter,Arial,sans-serif;
      background:linear-gradient(180deg,#f6f9ff,#eef4ff);
      color:var(--text);
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }

    .card{
      width:100%;
      max-width:460px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:var(--shadow);
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:16px;
      background:linear-gradient(135deg,#6fb6ff,#4f8df7);
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:800;
      font-size:24px;
      margin-bottom:14px;
    }

    h1{
      margin:0 0 6px 0;
      font-size:28px;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      margin-bottom:18px;
    }

    .field{
      display:grid;
      gap:6px;
      margin-bottom:12px;
    }

    .field label{
      font-size:13px;
      color:var(--muted);
    }

    input,button{
      width:100%;
      min-height:50px;
      padding:12px 14px;
      border-radius:14px;
      font-size:16px;
      font-family:inherit;
    }

    input{
      border:1px solid var(--border);
      background:#f8fbff;
      color:var(--text);
      outline:none;
    }

    input:focus{
      border-color:#7fb3ff;
      box-shadow:0 0 0 3px rgba(79,141,247,.14);
    }

    button{
      border:none;
      background:var(--primary);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      -webkit-appearance:none;
      appearance:none;
      touch-action:manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover{
      background:var(--primary2);
    }

    button:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    .secondary{
      margin-top:10px;
      background:#fff;
      color:var(--text);
      border:1px solid var(--border);
    }

    .hidden{
      display:none !important;
    }

    .status{
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#f6faff;
      white-space:pre-wrap;
      line-height:1.45;
      font-size:14px;
    }

    .ok{
      background:rgba(34,160,107,.10);
      border-color:rgba(34,160,107,.26);
      color:#1b7a55;
    }

    .err{
      background:rgba(226,91,91,.10);
      border-color:rgba(226,91,91,.28);
      color:#b03f3f;
    }

    .session-box{
      margin-top:16px;
      padding:14px;
      border:1px solid var(--border);
      border-radius:16px;
      background:#f8fbff;
    }

    .session-email{
      font-weight:800;
      font-size:18px;
      margin-bottom:8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">D</div>
    <h1>DebtYa</h1>
    <div class="sub">Prueba mínima de login móvil. Aquí no hay nada extra, solo autenticación.</div>

    <form id="loginForm" novalidate>
      <div id="guestBox">
        <div class="field">
          <label for="email">Correo</label>
          <input
            id="email"
            type="email"
            placeholder="Correo"
            autocomplete="email"
            inputmode="email"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            placeholder="Contraseña"
            autocomplete="current-password"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
        </div>

        <button id="loginBtn" type="submit">Iniciar sesión</button>
        <button id="signupBtn" type="button" class="secondary">Crear cuenta</button>
      </div>
    </form>

    <div id="sessionBox" class="session-box hidden">
      <div style="font-size:12px;color:#6e84a3;margin-bottom:6px;">Sesión activa</div>
      <div id="sessionEmail" class="session-email">-</div>
      <button id="logoutBtn" type="button" class="secondary">Salir</button>
    </div>

    <div id="statusBox" class="status">Listo. Prueba el login aquí.</div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://spybejltsgzfxlwzobkh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNweWJlamx0c2d6Znhsd3pvYmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzg3MDAsImV4cCI6MjA4NzcxNDcwMH0.gNcD19qAbc4fO0HnE7fK3yFLBq2NWlcyBq8LnokbmOs";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const els = {
      loginForm: document.getElementById("loginForm"),
      guestBox: document.getElementById("guestBox"),
      email: document.getElementById("email"),
      password: document.getElementById("password"),
      loginBtn: document.getElementById("loginBtn"),
      signupBtn: document.getElementById("signupBtn"),
      logoutBtn: document.getElementById("logoutBtn"),
      sessionBox: document.getElementById("sessionBox"),
      sessionEmail: document.getElementById("sessionEmail"),
      statusBox: document.getElementById("statusBox")
    };

    let loginLock = false;

    function setStatus(text, kind = "") {
      els.statusBox.className = "status";
      if (kind) els.statusBox.classList.add(kind);
      els.statusBox.textContent = text;
    }

    function setLoading(loading) {
      els.loginBtn.disabled = loading;
      els.loginBtn.textContent = loading ? "Entrando..." : "Iniciar sesión";
    }

    function updateUI(session) {
      const user = session?.user || null;
      if (user?.email) {
        els.guestBox.classList.add("hidden");
        els.sessionBox.classList.remove("hidden");
        els.sessionEmail.textContent = user.email;
        setStatus("Login correcto.", "ok");
      } else {
        els.guestBox.classList.remove("hidden");
        els.sessionBox.classList.add("hidden");
        els.sessionEmail.textContent = "-";
        setStatus("Listo. Prueba el login aquí.");
      }
    }

    async function doLogin() {
      if (loginLock) return false;
      loginLock = true;

      try {
        const email = (els.email.value || "").trim();
        const password = els.password.value || "";

        if (!email || !password) {
          throw new Error("Pon tu correo y tu contraseña.");
        }

        setLoading(true);
        setStatus("Intentando iniciar sesión...");

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        updateUI(data.session);
        return false;
      } catch (e) {
        setStatus("Error iniciando sesión:\n" + (e.message || String(e)), "err");
        return false;
      } finally {
        setLoading(false);
        setTimeout(() => { loginLock = false; }, 400);
      }
    }

    els.loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      await doLogin();
      return false;
    });

    els.loginBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      await doLogin();
      return false;
    });

    els.loginBtn.addEventListener("touchend", async (e) => {
      e.preventDefault();
      e.stopPropagation();
      await doLogin();
      return false;
    }, { passive: false });

    els.signupBtn.addEventListener("click", async () => {
      try {
        setStatus("Creando cuenta...");
        const { error } = await supabase.auth.signUp({
          email: (els.email.value || "").trim(),
          password: els.password.value || ""
        });
        if (error) throw error;
        setStatus("Cuenta creada. Si aplica, confirma en tu correo.", "ok");
      } catch (e) {
        setStatus("Error creando cuenta:\n" + (e.message || String(e)), "err");
      }
    });

    els.logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      els.email.value = "";
      els.password.value = "";
      updateUI(null);
    });

    const { data } = await supabase.auth.getSession();
    updateUI(data.session || null);
  </script>
</body>
</html>
