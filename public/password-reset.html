<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Origen de la API Node (fetch). En www estático debe apuntar al servicio Render, no a location.origin. -->
    <meta name="debtya-api-origin" content="https://debtya-api.onrender.com" />
    <meta name="debtya-supabase-url" content="https://spybejltsgzfxlwzobkh.supabase.co" />
    <meta
      name="debtya-supabase-anon"
      content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNweWJlamx0c2d6Znhsd3pvYmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzg3MDAsImV4cCI6MjA4NzcxNDcwMH0.gNcD19qAbc4fO0HnE7fK3yFLBq2NWlcyBq8LnokbmOs"
    />
    <title>DebtYa — Nueva contraseña</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #1e293b;
        border-radius: 14px;
        padding: 28px;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 10px;
        color: #fff;
      }
      .sub {
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.45;
        margin: 0 0 16px;
      }
      label {
        display: block;
        font-size: 0.82rem;
        margin: 12px 0 6px;
        color: #cbd5e1;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0f172a;
        color: #f8fafc;
        font-size: 1rem;
      }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border-radius: 8px;
        border: 0;
        font-weight: 600;
        cursor: pointer;
        font-size: 0.95rem;
      }
      .btn-primary {
        background: #2563eb;
        color: #fff;
      }
      .btn-primary:hover {
        background: #1d4ed8;
      }
      .btn-light {
        background: #334155;
        color: #e2e8f0;
      }
      .btn-light:hover {
        background: #475569;
      }
      .msg {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .msg.ok {
        background: #14532d;
        color: #bbf7d0;
      }
      .msg.err {
        background: #7f1d1d;
        color: #fecaca;
      }
      .email {
        font-size: 0.88rem;
        color: #93c5fd;
        margin-bottom: 8px;
        word-break: break-all;
      }
      a {
        color: #60a5fa;
        font-size: 0.88rem;
      }
      .foot {
        margin-top: 14px;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="tTitle">Nueva contraseña</h1>
      <p id="tSub" class="sub">
        Tras abrir el enlace del correo, elige una contraseña nueva y confirma con el código de 6 dígitos que enviamos a tu
        correo.
      </p>
      <div id="emailLine" class="email"></div>
      <label for="pw1" id="tPw1">Contraseña nueva</label>
      <input id="pw1" type="password" autocomplete="new-password" />
      <label for="pw2" id="tPw2">Confirmar</label>
      <input id="pw2" type="password" autocomplete="new-password" />
      <label for="code" id="tCode">Código del correo</label>
      <input id="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="000000" style="letter-spacing: 0.15em" />
      <button type="button" class="btn-light" id="btnSend">Enviar código al correo</button>
      <button type="button" class="btn-primary" id="btnSave">Guardar contraseña</button>
      <div id="msg" class="msg hidden"></div>
      <p class="foot"><a href="https://www.debtya.com/" id="tBack">Volver a DebtYa</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
    <script>
      (function () {
        var SUPABASE_URL = (function () {
          try {
            var m = document.querySelector('meta[name="debtya-supabase-url"]');
            var c = m && m.getAttribute("content");
            if (c && String(c).trim()) return String(c).trim();
          } catch (e) {}
          return "https://spybejltsgzfxlwzobkh.supabase.co";
        })();
        var SUPABASE_ANON_KEY = (function () {
          try {
            var m = document.querySelector('meta[name="debtya-supabase-anon"]');
            var c = m && m.getAttribute("content");
            if (c && String(c).trim()) return String(c).trim();
          } catch (e) {}
          return "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNweWJlamx0c2d6Znhsd3pvYmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMzg3MDAsImV4cCI6MjA4NzcxNDcwMH0.gNcD19qAbc4fO0HnE7fK3yFLBq2NWlcyBq8LnokbmOs";
        })();
        var DEBTYA_APP_HOME = "https://www.debtya.com/";
        var API_BASE = (function () {
          var w = typeof window !== "undefined" ? window : null;
          var pageHost = w && w.location ? String(w.location.hostname || "").toLowerCase() : "";
          var isDebtyaMarketing = pageHost === "www.debtya.com" || pageHost === "debtya.com";
          var inj =
            w && typeof w.__DEBTYA_API_BASE__ === "string"
              ? String(w.__DEBTYA_API_BASE__)
                  .trim()
                  .replace(/\/+$/, "")
              : "";
          if (inj) return inj;
          try {
            var m = document.querySelector('meta[name="debtya-api-origin"]');
            var mc = m && m.getAttribute("content");
            if (mc && String(mc).trim()) return String(mc).trim().replace(/\/+$/, "");
          } catch (e) {}
          try {
            var saved = localStorage.getItem("DEBTYA_API_BASE");
            if (saved && String(saved).trim()) {
              var clean = String(saved).trim().replace(/\/+$/, "");
              var savedHost = "";
              try {
                savedHost = new URL(clean.startsWith("http") ? clean : "https://" + clean).hostname.toLowerCase();
              } catch (e3) {
                savedHost = "";
              }
              var savedIsMarketingHost = savedHost === "www.debtya.com" || savedHost === "debtya.com";
              if (!(isDebtyaMarketing && savedIsMarketingHost)) return clean;
            }
          } catch (e) {}
          try {
            var loc = typeof location !== "undefined" ? location : null;
            if (loc && loc.hostname) {
              var hn = String(loc.hostname).toLowerCase();
              if (hn === "www.debtya.com" || hn === "debtya.com") return "https://debtya-api.onrender.com";
            }
          } catch (e2) {}
          return typeof location !== "undefined" && location.origin ? location.origin : "https://debtya-api.onrender.com";
        })();
        var LANG = (navigator.language || "es").toLowerCase().startsWith("es") ? "es" : "en";

        var msgEl = document.getElementById("msg");
        function showMsg(text, kind) {
          msgEl.textContent = text;
          msgEl.classList.remove("hidden", "ok", "err");
          msgEl.classList.add(kind === "err" ? "err" : "ok");
        }
        function hideMsg() {
          msgEl.classList.add("hidden");
        }

        if (LANG === "en") {
          document.documentElement.lang = "en";
          document.getElementById("tTitle").textContent = "New password";
          document.getElementById("tSub").textContent =
            "After opening the link from your email, choose a new password and confirm with the 6-digit code we send you.";
          document.getElementById("tPw1").textContent = "New password";
          document.getElementById("tPw2").textContent = "Confirm password";
          document.getElementById("tCode").textContent = "Code from email";
          document.getElementById("btnSend").textContent = "Email me a code";
          document.getElementById("btnSave").textContent = "Save password";
          document.getElementById("tBack").textContent = "Back to DebtYa";
        }

        var PKEY = "debtya_pw_recovery_pending";
        function setP() {
          try {
            sessionStorage.setItem(PKEY, JSON.stringify({ at: Date.now() }));
          } catch (e) {}
        }
        function getP() {
          try {
            var raw = sessionStorage.getItem(PKEY);
            if (!raw) return false;
            var j = JSON.parse(raw);
            return j && typeof j.at === "number" && Date.now() - j.at < 30 * 60 * 1000;
          } catch (e) {
            return false;
          }
        }
        function clearP() {
          try {
            sessionStorage.removeItem(PKEY);
          } catch (e) {}
        }

        function hashLooksRecovery(h) {
          if (!h) return false;
          var dec = h;
          try {
            dec = decodeURIComponent(h);
          } catch (e) {}
          return (
            /(^|[&?])type=recovery(&|$)/i.test(dec) ||
            /(^|[&?])type%3[dD]recovery(&|$)/i.test(h) ||
            dec.indexOf("type%3Drecovery") !== -1 ||
            (dec.indexOf("access_token=") !== -1 && dec.indexOf("type=recovery") !== -1)
          );
        }

        (function captureEarly() {
          try {
            var h = (location.hash || "").replace(/^#/, "");
            var q = new URLSearchParams(location.search || "");
            var rec = false;
            if (h) {
              var p = new URLSearchParams(h);
              rec =
                p.get("type") === "recovery" ||
                /(^|[&])type=recovery(&|$)/.test(h) ||
                h.indexOf("type%3Drecovery") !== -1 ||
                hashLooksRecovery(h);
              if (rec) {
                setP();
                try {
                  localStorage.removeItem("debtya_access_token");
                  var keys = Object.keys(localStorage);
                  for (var i = 0; i < keys.length; i++) {
                    var k = keys[i];
                    if (k.indexOf("sb-") === 0 && k.indexOf("auth-token") !== -1) localStorage.removeItem(k);
                  }
                } catch (e) {}
              }
            }
            if (q.get("debtya_pw_recovery") === "1") setP();
            if (q.get("code") && (location.pathname || "").indexOf("password-reset") !== -1) setP();
          } catch (e) {}
        })();

        if (!window.supabase || !window.supabase.createClient) {
          showMsg(LANG === "es" ? "No se pudo cargar la librería de sesión. Recarga la página." : "Could not load auth library. Refresh.", "err");
          return;
        }

        var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: {
            detectSessionInUrl: true,
            persistSession: true,
            autoRefreshToken: true,
            storage: localStorage
          }
        });

        function policyOk(pw) {
          if (typeof pw !== "string" || pw.length < 8) return false;
          if (!/[A-Z]/.test(pw)) return false;
          if (!/[a-z]/.test(pw)) return false;
          if (!/[0-9]/.test(pw)) return false;
          if (!/[^A-Za-z0-9]/.test(pw)) return false;
          return true;
        }

        async function getBearer() {
          var d = await client.auth.getSession();
          var tok = d.data && d.data.session && d.data.session.access_token;
          for (var n = 0; n < 24 && !tok; n++) {
            await new Promise(function (r) {
              setTimeout(r, 100);
            });
            d = await client.auth.getSession();
            tok = d.data && d.data.session && d.data.session.access_token;
          }
          return tok || null;
        }

        async function boot() {
          var qs = new URLSearchParams(location.search || "");
          if (qs.has("code")) setP();
          if (!getP()) {
            showMsg(
              LANG === "es"
                ? "Abre el enlace del correo «restablecer contraseña» (esta página debe abrirse justo después)."
                : "Open the password reset link from your email (this page should open right after that).",
              "err"
            );
            return;
          }
          var bearer = await getBearer();
          if (!bearer) {
            clearP();
            showMsg(
              LANG === "es"
                ? "No hay sesión de recuperación. Pide un nuevo correo desde la pantalla de entrada."
                : "No recovery session. Request a new reset from the sign-in page.",
              "err"
            );
            return;
          }
          var u = await client.auth.getUser();
          if (u && u.data && u.data.user && u.data.user.email) {
            document.getElementById("emailLine").textContent = u.data.user.email;
          }
          try {
            var path = location.pathname || "/";
            var search = location.search || "";
            history.replaceState({}, document.title, path + search);
          } catch (e) {}
        }

        document.getElementById("btnSend").addEventListener("click", async function () {
          hideMsg();
          try {
            var bearer = await getBearer();
            if (!bearer) throw new Error(LANG === "es" ? "Sin sesión" : "No session");
            var res = await fetch(API_BASE + "/auth/password-reset/session/send-code", {
              method: "POST",
              headers: { "Content-Type": "application/json", Authorization: "Bearer " + bearer },
              body: JSON.stringify({ lang: LANG })
            });
            var json = await res.json().catch(function () {
              return {};
            });
            if (!res.ok)
              throw new Error(
                [json.error, json.details].filter(Boolean).join(" — ") || "HTTP " + res.status
              );
            showMsg(json.message || (LANG === "es" ? "Revisa tu correo." : "Check your email."), "ok");
          } catch (e) {
            showMsg(e.message || String(e), "err");
          }
        });

        document.getElementById("btnSave").addEventListener("click", async function () {
          hideMsg();
          try {
            var bearer = await getBearer();
            if (!bearer) throw new Error(LANG === "es" ? "Sin sesión" : "No session");
            var pw = document.getElementById("pw1").value.trim();
            var pw2 = document.getElementById("pw2").value.trim();
            var code = document.getElementById("code").value.trim();
            if (!pw || !pw2) throw new Error(LANG === "es" ? "Completa ambas contraseñas." : "Fill both password fields.");
            if (pw !== pw2) throw new Error(LANG === "es" ? "Las contraseñas no coinciden." : "Passwords do not match.");
            if (!policyOk(pw))
              throw new Error(
                LANG === "es"
                  ? "La contraseña debe tener 8+ caracteres, mayúscula, minúscula, número y símbolo."
                  : "Password needs 8+ chars with upper, lower, number and symbol."
              );
            if (!/^\d{6}$/.test(code)) throw new Error(LANG === "es" ? "El código son 6 dígitos." : "Code must be 6 digits.");
            var res = await fetch(API_BASE + "/auth/password-reset/session/complete", {
              method: "POST",
              headers: { "Content-Type": "application/json", Authorization: "Bearer " + bearer },
              body: JSON.stringify({ password: pw, code: code, lang: LANG })
            });
            var json = await res.json().catch(function () {
              return {};
            });
            if (!res.ok)
              throw new Error(
                [json.error, json.details].filter(Boolean).join(" — ") || "HTTP " + res.status
              );
            clearP();
            showMsg(json.message || (LANG === "es" ? "Listo. Redirigiendo…" : "Done. Redirecting…"), "ok");
            setTimeout(function () {
              location.href = DEBTYA_APP_HOME;
            }, 800);
          } catch (e) {
            showMsg(e.message || String(e), "err");
          }
        });

        boot();
      })();
    </script>
  </body>
</html>
